<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Run</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>New Comparison Run</h1>
    <div>
      <a class="button" href="/" style="background:#374151;">← Home</a>
      <a class="button" href="/settings" style="background:#374151; margin-left:8px;">Settings</a>
    </div>
  </header>
  <main>
    <div id="modelConfigInfo" class="muted">Saved named model configs are used to auto-fill file paths. Configure them in Settings.</div>

    <label>Label (optional)</label>
    <input type="text" id="label" placeholder="e.g. sunset-prompt-v1">

    <label>Model</label>
    <select id="model"></select>

    <label>Prompt (shared across all pipelines in this run)</label>
    <input type="text" id="prompt" placeholder="A beautiful sunset over the ocean">

    <label>Execution mode</label>
    <select id="execMode">
      <option value="sequential">Sequential (one after another)</option>
      <option value="parallel">Parallel (one node per pipeline)</option>
    </select>

    <label>Pipelines to compare</label>
    <div id="pipelineList"></div>

    <div style="margin-top:20px;">
      <button id="runBtn">Run Comparison</button>
      <span id="status" class="muted" style="margin-left:12px;"></span>
    </div>
  </main>

<script>
let pipelinesByModel = {};
let nodes = [];
let scanMatches = {};

function getSavedModelConfigs() {
  try {
    return JSON.parse(localStorage.getItem('modelPathConfigs') || '[]');
  } catch {
    return [];
  }
}

function getSavedModelConfig(model) {
  return getSavedModelConfigs().find((cfg) => cfg.model.toLowerCase() === model.toLowerCase()) || null;
}

async function scanModelPath(model, path) {
  const res = await fetch('/api/scan-model-path', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model, path }),
  });
  if (!res.ok) {
    throw new Error(await res.text());
  }
  return res.json();
}

function initialPathValue(p) {
  const defaultPath = p.default_path ?? p.default ?? '';
  if (!defaultPath) return '';
  const match = scanMatches[p.name];
  if (match) return match;
  const config = getSavedModelConfig(document.getElementById('model').value);
  if (!config) return defaultPath;
  if (/^(path[\\/]to|\.\/|\.\\\/|\/path[\\/]to)/.test(defaultPath) || defaultPath.startsWith('path/to') || defaultPath.startsWith('path\\to')) {
    return config.path.replace(/[\\/]+$/, '') + '/' + PathBasename(defaultPath);
  }
  return defaultPath;
}

function PathBasename(path) {
  return path.split(/[\\/]/).pop();
}

async function init() {
  const [pRes, nRes] = await Promise.all([fetch('/api/pipelines'), fetch('/api/nodes')]);
  const allPipelines = await pRes.json();
  nodes = await nRes.json();

  pipelinesByModel = {};
  for (const name in allPipelines) {
    const def = allPipelines[name];
    (pipelinesByModel[def.model] ||= []).push(def);
  }

  const modelSelect = document.getElementById('model');
  modelSelect.innerHTML = Object.keys(pipelinesByModel)
    .map(m => `<option value="${m}">${m.toUpperCase()}</option>`).join('');
  modelSelect.addEventListener('change', async () => {
    renderPipelines();
    await autoFillConfigMatches(modelSelect.value);
  });

  renderPipelines();
  await autoFillConfigMatches(modelSelect.value);
}

function updateModelConfigInfo(model) {
  const info = document.getElementById('modelConfigInfo');
  const config = getSavedModelConfig(model);
  if (!config) {
    info.textContent = 'No saved path for this model. Use Settings to add a model config.';
    scanMatches = {};
    return;
  }
  info.textContent = `Using saved model root path: ${config.path}`;
}

async function autoFillConfigMatches(model) {
  scanMatches = {};
  updateModelConfigInfo(model);
  const config = getSavedModelConfig(model);
  if (!config) return;
  const info = document.getElementById('modelConfigInfo');
  info.textContent = `Scanning saved path for ${model}...`;
  try {
    const result = await scanModelPath(model, config.path);
    scanMatches = result.matches || {};
    renderPipelines();
    info.textContent = `Using saved model root path: ${config.path}`;
  } catch (err) {
    scanMatches = {};
    info.textContent = `Saved path scan failed: ${err.message}`;
  }
}

function paramField(pipelineName, p) {
  const id = `p_${pipelineName}_${p.name}`;
  if (p.type === 'bool_flag') {
    return `<div class="checkbox-row">
      <input type="checkbox" id="${id}" ${p.default ? 'checked' : ''}>
      <label for="${id}" style="margin:0;">${p.name} (${p.flag})</label>
    </div>`;
  }
  if (p.type === 'path_and_weight') {
    const pathValue = initialPathValue(p);
    return `<label>${p.name} (${p.flag})</label>
      <div class="two-col">
        <input type="text" id="${id}_path" value="${pathValue}">
        <input type="number" step="0.1" id="${id}_weight" value="${p.default_weight ?? ''}">
      </div>`;
  }
  if (p.shared) return ''; // prompt comes from the shared field above
  if (p.auto) return '';   // output path is set by the backend
  const val = p.type === 'path' ? initialPathValue(p) : (p.default ?? '');
  const inputType = p.type === 'int' ? 'number' : 'text';
  return `<label>${p.name} (${p.flag})${p.required ? ' *' : ''}</label>
    <input type="${inputType}" id="${id}" value="${val === null ? '' : val}">`;
}

function renderPipelines() {
  const model = document.getElementById('model').value;
  const defs = pipelinesByModel[model] || [];
  const nodeOptions = nodes.map(n => `<option value="${n.id}">${n.id}</option>`).join('');

  document.getElementById('pipelineList').innerHTML = defs.map(def => `
    <div class="pipeline-block">
      <div class="checkbox-row">
        <input type="checkbox" class="pipeline-toggle" id="use_${def.name}" data-pipeline="${def.name}">
        <h3 style="margin:0;">${def.display_name}</h3>
      </div>
      <label>Node</label>
      <select id="node_${def.name}">
        <option value="">Auto (round robin)</option>
        ${nodeOptions}
      </select>
      ${def.params.map(p => paramField(def.name, p)).join('')}
    </div>
  `).join('');
}

async function runComparison() {
  const label = document.getElementById('label').value || null;
  const model = document.getElementById('model').value;
  const prompt = document.getElementById('prompt').value;
  const execution_mode = document.getElementById('execMode').value;

  const selected = [...document.querySelectorAll('.pipeline-toggle:checked')]
    .map(el => el.dataset.pipeline);

  if (!prompt || selected.length === 0) {
    alert('Enter a prompt and select at least one pipeline.');
    return;
  }

  const defs = pipelinesByModel[model];
  const jobs = selected.map(pipelineName => {
    const def = defs.find(d => d.name === pipelineName);
    const node_id = document.getElementById(`node_${pipelineName}`).value || null;
    const overrides = [];
    for (const p of def.params) {
      if (p.shared || p.auto) continue;
      const id = `p_${pipelineName}_${p.name}`;
      if (p.type === 'bool_flag') {
        overrides.push({ name: p.name, enabled: document.getElementById(id).checked });
      } else if (p.type === 'path_and_weight') {
        overrides.push({
          name: p.name,
          value: document.getElementById(`${id}_path`).value,
          weight: parseFloat(document.getElementById(`${id}_weight`).value) || null,
        });
      } else {
        overrides.push({ name: p.name, value: document.getElementById(id).value });
      }
    }
    return { pipeline_name: pipelineName, node_id, overrides };
  });

  document.getElementById('status').textContent = 'Running… this can take a while, keep this tab open.';
  document.getElementById('runBtn').disabled = true;

  const res = await fetch('/api/runs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ label, model, prompt, execution_mode, jobs }),
  });

  if (!res.ok) {
    document.getElementById('status').textContent = 'Failed to start run: ' + (await res.text());
    document.getElementById('runBtn').disabled = false;
    return;
  }
  const record = await res.json();
  window.location.href = `/run/${record.run_id}`;
}

document.getElementById('runBtn').addEventListener('click', runComparison);
init();
</script>
</body>
</html>
