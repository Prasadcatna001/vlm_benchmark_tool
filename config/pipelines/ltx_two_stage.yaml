# This one is filled in from the exact command you shared. Edit values/flags
# freely -- the backend just builds `python -m <module> <flags...>` from this.

name: ltx_two_stage
display_name: "LTX - Two Stage"
model: ltx
module: ltx_pipelines.ti2vid_two_stages

params:
  - name: checkpoint_path
    flag: --checkpoint-path
    type: path
    required: true
    default: "path/to/checkpoint.safetensors"

  - name: distilled_lora
    flag: --distilled-lora
    type: path_and_weight     # emits: --distilled-lora <path> <weight>
    required: false
    default_path: "path/to/distilled_lora.safetensors"
    default_weight: 0.8

  - name: spatial_upsampler_path
    flag: --spatial-upsampler-path
    type: path
    required: false
    default: "path/to/upsampler.safetensors"

  - name: gemma_root
    flag: --gemma-root
    type: path
    required: true
    default: "path/to/gemma"

  - name: prompt
    flag: --prompt
    type: string
    required: true
    shared: true              # this comes from the shared "one prompt" field in a run

  - name: output_path
    flag: --output-path
    type: path
    required: true
    auto: true                # backend fills this in per-run, per-pipeline

  - name: num_frames
    flag: --num-frames
    type: int
    required: false
    default: null

  - name: frame_rate
    flag: --frame-rate
    type: int
    required: false
    default: null
